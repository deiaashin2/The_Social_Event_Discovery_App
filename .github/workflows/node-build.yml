name: Node.js Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build Backend
        run: |
          cd backend
          npm install
          # Add 'npm run build' here if your backend has a build step

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
